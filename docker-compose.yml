services:

  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    volumes:
      - ollama_storage:/root/.ollama

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_HOST=http://ai-engine:11434
    depends_on:
      - ai-engine

volumes:
  ollama_storage: